version: "2"

linters:
  enable:
    - bodyclose
    - copyloopvar
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - funlen
    - gocritic
    - govet
    - gosec
    - ineffassign
    - staticcheck
    - unused
    - lll
    - misspell
    - unconvert
    - prealloc
    - exhaustive
    - noctx
    - revive
    - nolintlint
    - whitespace
  exclusions:
    paths:
      - .github
      - .claude
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
    - golines
  settings:
    gofmt:
      rewrite-rules:
        - pattern: 'interface{}'
          replacement: 'any'
    goimports:
      local-prefixes:
        - github.com/jonioliveira/wt

issues:
  max-same-issues: 0
